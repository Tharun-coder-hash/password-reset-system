# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reset-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reset-app
  template:
    metadata:
      labels:
        app: reset-app
    spec:
      containers:
      - name: reset-container
        image: your-dockerhub-user/password-reset:latest
        ports:
        - containerPort: 8080
---
# service.yaml
apiVersion: v1
kind: Service
metadata:
  name: reset-service
spec:
  type: LoadBalancer
  selector:
    app: reset-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
