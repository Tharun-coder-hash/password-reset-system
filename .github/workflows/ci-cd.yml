name: CI/CD Pipeline
on: [push]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Test & Build
        run: mvn clean package

      - name: Build Docker Image
        run: docker build -t your-dockerhub-user/password-reset:latest .

      # Note: For production, you would add login and push steps here
